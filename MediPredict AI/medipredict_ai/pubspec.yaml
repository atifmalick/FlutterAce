name: medipredict_ai
description: "MediPredict AI - AI-Powered Health Companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Charts
  fl_chart: ^0.70.2

  # UI / UX
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Image Picking
  image_picker: ^1.1.2

  # Routing
  go_router: ^14.8.1

  # Utilities
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1

  # ML Kit OCR
  google_mlkit_text_recognition: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
