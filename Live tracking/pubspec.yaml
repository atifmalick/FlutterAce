name: circleguard
description: Real-time location-sharing app with Supabase and Google Maps.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Authentication & Backend
  supabase_flutter: ^2.0.0
  supabase: ^2.0.0
  
  # Maps & Location
  google_maps_flutter: ^2.7.0
  geolocator: ^10.0.0
  
  # Background Tasks
  flutter_background_service: ^5.0.5
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # UI/UX
  material_design_icons_flutter: ^7.0.7296
  animations: ^2.0.0
  connectivity_plus: ^6.0.0
  
  # Utilities
  geocoding: ^2.1.0
  intl: ^0.19.0
  uuid: ^4.0.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
